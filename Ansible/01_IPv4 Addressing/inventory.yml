---
all:
  children:
    cisco_ios:
      hosts:
        R1:
          ansible_host: 192.168.1.20
        
  vars_files:
    - group_vars/all/secrets.yml
    - group_vars/all/vars_used.yml
  vars:
    ansible_network_os: cisco.ios.io
    ansible_connection: ansible.netcommon.network_cli
    ansible_user: lfftadmin
    ansible_password: lfftadmin
    ansible_password: "{{ my_clusters_root_password }}"
    ansible_become: true
    ansible_become_method: enable
    ansible_become_password: "{{ my_clusters_root_password }}"
    ansible_ssh_private_key_file: /home/lfft/.ssh/id_rsa.pub