[defaults]
inventory = inventory.yml
host_key_checking = False
interpreter_python = auto_silent
[ssh_connection]
ssh_args = -o KexAlgorithms=+diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 -o HostKeyAlgorithms=+ssh-rsa
#ssh_args= -C -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group18-sha512,diffie-hellman-group16-sha512,diffie-hellman-group-exchange-sha256,diffie-hellman-group14-sha256 -c aes256-cbc -o RequiredRSASize=1024
[persistent_connection]
ssh_type = libssh
